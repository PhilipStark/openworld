<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OpenWorld Sprite Preview</title>
<style>
  body { margin: 0; background: #111; color: #fff; font-family: monospace; display: flex; flex-wrap: wrap; gap: 16px; padding: 24px; }
  .section { background: #1a1a2e; padding: 16px; border-radius: 8px; border: 1px solid #333; }
  .section h2 { margin: 0 0 12px; color: #f1c40f; font-size: 14px; }
  .grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .tile { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .tile span { font-size: 10px; color: #888; }
  canvas { image-rendering: pixelated; border: 1px solid #333; }
</style>
</head>
<body>
<div class="section">
  <h2>TILE SPRITES (32x32)</h2>
  <div class="grid" id="tiles"></div>
</div>
<div class="section">
  <h2>CHARACTER SPRITES (32x32) — 4 Directions × 4 Walk Frames</h2>
  <div class="grid" id="chars"></div>
</div>
<div class="section">
  <h2>STRUCTURE SPRITES (32x32)</h2>
  <div class="grid" id="structs"></div>
</div>
<div class="section">
  <h2>TILE MAP SAMPLE (scaled 2x)</h2>
  <canvas id="mapCanvas" width="640" height="640"></canvas>
</div>

<script type="module">
// Inline the sprite generation logic (same as SpriteGenerator.js but standalone)
const TILE = 32;

function seededRandom(seed) {
  let s = seed;
  return () => { s = (s * 16807 + 0) % 2147483647; return (s - 1) / 2147483646; };
}

function colorVariant(base, rng, range = 15) {
  const r = parseInt(base.slice(1, 3), 16);
  const g = parseInt(base.slice(3, 5), 16);
  const b = parseInt(base.slice(5, 7), 16);
  const dr = Math.floor((rng() - 0.5) * range * 2);
  const dg = Math.floor((rng() - 0.5) * range * 2);
  const db = Math.floor((rng() - 0.5) * range * 2);
  return `rgb(${cl(r+dr)},${cl(g+dg)},${cl(b+db)})`;
}

function cl(v) { return Math.max(0, Math.min(255, v)); }

// ── TILE GENERATORS ──
function generateGrass(ctx, rng) {
  for (let y = 0; y < TILE; y++) for (let x = 0; x < TILE; x++) { ctx.fillStyle = colorVariant('#5a9e3e', rng, 12); ctx.fillRect(x, y, 1, 1); }
  for (let i = 0; i < 18; i++) { const gx = Math.floor(rng()*TILE), gy = Math.floor(rng()*TILE), h = 2+Math.floor(rng()*3); ctx.fillStyle = colorVariant('#6ebb4a', rng, 20); ctx.fillRect(gx, gy-h, 1, h); if (rng()>0.5) ctx.fillRect(gx+1, gy-h+1, 1, 1); }
  if (rng()>0.7) { const fx=Math.floor(rng()*(TILE-4))+2, fy=Math.floor(rng()*(TILE-4))+2; ctx.fillStyle=['#f5e642','#ff6b9d','#ffffff','#c084fc'][Math.floor(rng()*4)]; ctx.fillRect(fx,fy,2,2); ctx.fillStyle='#4a7c2e'; ctx.fillRect(fx,fy+2,1,2); }
}

function generateWater(ctx, rng, frame=0) {
  for (let y = 0; y < TILE; y++) for (let x = 0; x < TILE; x++) { const wave=Math.sin((x+frame*4)*0.3)*4+Math.sin((y+frame*2)*0.25)*3; const base=60+wave; ctx.fillStyle=`rgb(${cl(30+Math.floor(rng()*10))},${cl(base+60+Math.floor(rng()*15))},${cl(base+150+Math.floor(rng()*20))})`; ctx.fillRect(x,y,1,1); }
  for (let i=0;i<4;i++){const wx=Math.floor(rng()*(TILE-6))+3,wy=Math.floor(rng()*(TILE-2));ctx.fillStyle='rgba(180,220,255,0.4)';ctx.fillRect(wx,wy,3+Math.floor(rng()*4),1);}
}

function generateForest(ctx, rng) {
  for(let y=0;y<TILE;y++)for(let x=0;x<TILE;x++){ctx.fillStyle=colorVariant('#3a5e2a',rng,8);ctx.fillRect(x,y,1,1);}
  ctx.fillStyle='#5c3d1e';ctx.fillRect(13,18,6,14);ctx.fillStyle='#4a3118';ctx.fillRect(14,18,2,14);
  const greens=['#2d6e1e','#348a22','#27591a','#3a9928'];
  for(let dy=-2;dy<10;dy++)for(let dx=-6;dx<7;dx++){const dist=Math.sqrt(dx*dx+dy*dy);if(dist<8+rng()*2){ctx.fillStyle=greens[Math.floor(rng()*greens.length)];ctx.fillRect(16+dx,10+dy,2,2);}}
  for(let i=0;i<6;i++){ctx.fillStyle='#4cc830';ctx.fillRect(8+Math.floor(rng()*16),4+Math.floor(rng()*12),1,1);}
}

function generateRock(ctx, rng) {
  for(let y=0;y<TILE;y++)for(let x=0;x<TILE;x++){ctx.fillStyle=colorVariant('#7a7a7a',rng,10);ctx.fillRect(x,y,1,1);}
  for(let i=0;i<5;i++){const sx=Math.floor(rng()*(TILE-8)),sy=Math.floor(rng()*(TILE-6)),sw=4+Math.floor(rng()*8),sh=3+Math.floor(rng()*5);ctx.fillStyle=colorVariant('#8a8a8a',rng,15);ctx.fillRect(sx,sy,sw,sh);ctx.fillStyle=colorVariant('#606060',rng,8);ctx.fillRect(sx,sy+sh-1,sw,1);ctx.fillRect(sx+sw-1,sy,1,sh);}
  for(let i=0;i<3;i++){let cx=Math.floor(rng()*TILE),cy=Math.floor(rng()*TILE);ctx.fillStyle='#505050';for(let j=0;j<6;j++){ctx.fillRect(cx,cy,1,1);cx+=Math.floor(rng()*3)-1;cy+=1;}}
}

function generateSand(ctx, rng) {
  for(let y=0;y<TILE;y++)for(let x=0;x<TILE;x++){ctx.fillStyle=colorVariant('#d4b84a',rng,12);ctx.fillRect(x,y,1,1);}
  for(let i=0;i<5;i++){const ry=4+Math.floor(rng()*(TILE-8));ctx.fillStyle='rgba(200,170,60,0.5)';ctx.fillRect(Math.floor(rng()*8),ry,TILE-Math.floor(rng()*16),1);}
}

function generateMountain(ctx, rng) {
  for(let y=0;y<TILE;y++)for(let x=0;x<TILE;x++){ctx.fillStyle=colorVariant('#5a4a3a',rng,8);ctx.fillRect(x,y,1,1);}
  const pc=['#7a6a52','#8a7a62','#6a5a42'];
  for(let y=0;y<TILE;y++){const hw=Math.floor((TILE/2)*(1-y/TILE)*0.9)+4;const sx=TILE/2-hw;for(let x=sx;x<sx+hw*2;x++){if(x>=0&&x<TILE){ctx.fillStyle=pc[Math.floor(rng()*pc.length)];ctx.fillRect(x,y,1,1);}}}
  for(let y=0;y<8;y++){const hw=Math.floor(6*(1-y/8))+1;const sx=TILE/2-hw;for(let x=sx;x<sx+hw*2;x++){if(x>=0&&x<TILE&&rng()>0.2){ctx.fillStyle=colorVariant('#e8e8f0',rng,8);ctx.fillRect(x,y,1,1);}}}
}

function generateFertileSoil(ctx, rng) {
  for(let y=0;y<TILE;y++)for(let x=0;x<TILE;x++){ctx.fillStyle=colorVariant('#6b4226',rng,10);ctx.fillRect(x,y,1,1);}
  for(let row=0;row<4;row++){const ry=4+row*8;ctx.fillStyle='#553520';ctx.fillRect(2,ry,TILE-4,2);ctx.fillStyle='#7a5236';ctx.fillRect(2,ry-1,TILE-4,1);}
  for(let i=0;i<5;i++){const sx=4+Math.floor(rng()*(TILE-8)),sy=Math.floor(rng()*TILE);ctx.fillStyle='#5aa832';ctx.fillRect(sx,sy-2,1,3);ctx.fillRect(sx-1,sy-3,1,1);ctx.fillRect(sx+1,sy-3,1,1);}
}

// ── CHARACTER ──
const SKIN=['#f5d0a9','#d4a574','#8d5524','#c68642','#e0ac69'];
const HAIR=['#2c1810','#8b4513','#daa520','#c0392b','#f5f5f5','#1a1a2e'];
const SHIRT=['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e67e22','#34495e'];

function generateCharacter(ctx, rng, direction=0, walkFrame=0) {
  const skinColor=SKIN[Math.floor(rng()*SKIN.length)];
  const hairColor=HAIR[Math.floor(rng()*HAIR.length)];
  const shirtColor=SHIRT[Math.floor(rng()*SHIRT.length)];
  const pantsColor=['#2c3e50','#1a1a2e','#4a4a2e','#2e1a1a'][Math.floor(rng()*4)];
  const legOffset=walkFrame===1?1:walkFrame===3?-1:0;
  const facingDown=direction===0,facingUp=direction===2,facingSide=direction===1||direction===3;
  const flipX=direction===3;

  ctx.save();
  if(flipX){ctx.translate(32,0);ctx.scale(-1,1);}

  ctx.fillStyle='rgba(0,0,0,0.2)';ctx.beginPath();ctx.ellipse(16,30,7,3,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=pantsColor;ctx.fillRect(11+legOffset,22,4,7);ctx.fillRect(17-legOffset,22,4,7);
  ctx.fillStyle='#3d2817';ctx.fillRect(10+legOffset,28,5,3);ctx.fillRect(16-legOffset,28,6,3);
  ctx.fillStyle=shirtColor;ctx.fillRect(10,14,12,9);
  ctx.fillStyle='rgba(0,0,0,0.15)';ctx.fillRect(10,14,2,9);ctx.fillRect(20,14,2,9);
  ctx.fillStyle=shirtColor;
  if(facingSide){ctx.fillRect(8,14,3,7);}else{ctx.fillRect(7,14,3,7+legOffset);ctx.fillRect(22,14,3,7-legOffset);}
  ctx.fillStyle=skinColor;ctx.fillRect(7,20+legOffset,3,2);if(!facingSide)ctx.fillRect(22,20-legOffset,3,2);
  ctx.fillStyle=skinColor;ctx.fillRect(11,5,10,10);
  ctx.fillStyle=hairColor;
  if(facingDown||facingSide){ctx.fillRect(10,3,12,4);ctx.fillRect(10,3,2,8);ctx.fillRect(20,3,2,8);}
  if(facingUp){ctx.fillRect(10,3,12,12);}
  if(facingDown){ctx.fillStyle='#1a1a1a';ctx.fillRect(13,8,2,2);ctx.fillRect(17,8,2,2);ctx.fillStyle='#ffffff';ctx.fillRect(13,8,1,1);ctx.fillRect(17,8,1,1);ctx.fillStyle='#c0392b';ctx.fillRect(14,12,4,1);}
  else if(facingSide){ctx.fillStyle='#1a1a1a';ctx.fillRect(14,8,2,2);ctx.fillStyle='#ffffff';ctx.fillRect(14,8,1,1);ctx.fillStyle='#c0392b';ctx.fillRect(13,12,3,1);}

  ctx.restore();
}

// ── STRUCTURES ──
function generateShelter(ctx, rng) {
  ctx.fillStyle='#8b6914';ctx.fillRect(2,10,28,20);
  for(let y=10;y<30;y+=4){ctx.fillStyle='#7a5c12';ctx.fillRect(2,y,28,1);}
  ctx.fillStyle='#a0522d';for(let i=0;i<8;i++){ctx.fillRect(2-i,10-i,28+i*2,2);}
  ctx.fillStyle='#8b4513';for(let i=0;i<8;i+=2){ctx.fillRect(2-i,10-i,28+i*2,1);}
  ctx.fillStyle='#5c3d1e';ctx.fillRect(12,18,8,12);ctx.fillStyle='#daa520';ctx.fillRect(18,23,2,2);
  ctx.fillStyle='#87ceeb';ctx.fillRect(4,14,6,5);ctx.fillStyle='#5c3d1e';ctx.fillRect(6,14,2,5);ctx.fillRect(4,16,6,1);
}

function generateStorage(ctx, rng) {
  ctx.fillStyle='#8b6914';ctx.fillRect(4,12,24,16);
  ctx.fillStyle='#a07818';ctx.fillRect(3,8,26,6);ctx.fillRect(4,6,24,4);
  ctx.fillStyle='#808080';ctx.fillRect(4,10,24,2);ctx.fillRect(4,22,24,2);
  ctx.fillStyle='#daa520';ctx.fillRect(14,12,4,4);ctx.fillStyle='#1a1a1a';ctx.fillRect(15,13,2,2);
  ctx.fillStyle='rgba(0,0,0,0.15)';ctx.fillRect(4,14,24,14);
}

function generateCraftingTable(ctx, rng) {
  ctx.fillStyle='#c4952a';ctx.fillRect(2,8,28,4);ctx.fillStyle='#b08425';ctx.fillRect(2,12,28,2);
  ctx.fillStyle='#8b6914';ctx.fillRect(2,8,28,1);for(let x=2;x<30;x+=7)ctx.fillRect(x,8,1,4);
  ctx.fillStyle='#6b4912';ctx.fillRect(4,14,4,16);ctx.fillRect(24,14,4,16);
  ctx.fillStyle='#808080';ctx.fillRect(10,6,2,6);ctx.fillRect(8,5,6,2);
  ctx.fillStyle='#a0522d';ctx.fillRect(18,7,6,2);ctx.fillRect(20,5,2,6);
}

function generateWall(ctx, rng) {
  for(let y=0;y<TILE;y+=6){const offset=(y/6)%2===0?0:8;for(let x=-8;x<TILE+8;x+=16){ctx.fillStyle=colorVariant('#808080',rng,15);ctx.fillRect(x+offset,y,15,5);ctx.fillStyle='#606060';ctx.fillRect(x+offset,y+5,15,1);ctx.fillRect(x+offset+15,y,1,6);}}
  ctx.fillStyle='#a0a0a0';for(let y=5;y<TILE;y+=6)ctx.fillRect(0,y,TILE,1);
}

function generateSign(ctx, rng) {
  ctx.fillStyle='#6b4912';ctx.fillRect(14,16,4,16);
  ctx.fillStyle='#c4952a';ctx.fillRect(4,4,24,14);
  ctx.fillStyle='#a07818';ctx.fillRect(4,4,24,2);ctx.fillRect(4,16,24,2);ctx.fillRect(4,4,2,14);ctx.fillRect(26,4,2,14);
  ctx.fillStyle='#3d2817';ctx.fillRect(8,8,16,2);ctx.fillRect(10,12,12,2);
}

// ── RENDER ──
const TILE_GENS = { grass: generateGrass, water: generateWater, forest: generateForest, rock: generateRock, sand: generateSand, mountain: generateMountain, fertile_soil: generateFertileSoil };
const STRUCT_GENS = { shelter: generateShelter, storage: generateStorage, crafting_table: generateCraftingTable, wall: generateWall, sign: generateSign };

function renderSprite(gen, seed, ...args) {
  const c = document.createElement('canvas'); c.width = 64; c.height = 64;
  const ctx = c.getContext('2d');
  // Draw at 32x32 then scale
  const tmp = document.createElement('canvas'); tmp.width = 32; tmp.height = 32;
  const tctx = tmp.getContext('2d');
  gen(tctx, seededRandom(seed), ...args);
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(tmp, 0, 0, 64, 64);
  return c;
}

// Tile preview
const tilesDiv = document.getElementById('tiles');
for (const [name, gen] of Object.entries(TILE_GENS)) {
  const div = document.createElement('div'); div.className = 'tile';
  div.appendChild(renderSprite(gen, 42));
  const span = document.createElement('span'); span.textContent = name;
  div.appendChild(span);
  tilesDiv.appendChild(div);
}

// Character preview (3 agents, 4 directions × 4 walk frames)
const charsDiv = document.getElementById('chars');
for (let agentSeed of [42, 1337, 9999]) {
  for (let dir = 0; dir < 4; dir++) {
    for (let frame = 0; frame < 4; frame++) {
      const div = document.createElement('div'); div.className = 'tile';
      const c = document.createElement('canvas'); c.width = 64; c.height = 64;
      const ctx = c.getContext('2d');
      const tmp = document.createElement('canvas'); tmp.width = 32; tmp.height = 32;
      const tctx = tmp.getContext('2d');
      const rng = seededRandom(agentSeed);
      // Pre-roll consistent colors
      const pick = arr => arr[Math.floor(rng() * arr.length)];
      const skin = pick(SKIN), hair = pick(HAIR), shirt = pick(SHIRT);
      const rng2 = seededRandom(agentSeed + dir * 100 + frame * 1000);
      generateCharacter(tctx, rng2, dir, frame);
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(tmp, 0, 0, 64, 64);
      div.appendChild(c);
      const dirs = ['↓','←','↑','→'];
      const span = document.createElement('span'); span.textContent = `${dirs[dir]} f${frame}`;
      div.appendChild(span);
      charsDiv.appendChild(div);
    }
  }
  // Separator
  const sep = document.createElement('div');
  sep.style.cssText = 'width:100%;height:1px;background:#333;margin:4px 0';
  charsDiv.appendChild(sep);
}

// Structures preview
const structsDiv = document.getElementById('structs');
for (const [name, gen] of Object.entries(STRUCT_GENS)) {
  const div = document.createElement('div'); div.className = 'tile';
  div.appendChild(renderSprite(gen, 42));
  const span = document.createElement('span'); span.textContent = name;
  div.appendChild(span);
  structsDiv.appendChild(div);
}

// Tile map sample (20x20 grid)
const mapCanvas = document.getElementById('mapCanvas');
const mctx = mapCanvas.getContext('2d');
mctx.imageSmoothingEnabled = false;
const tileTypes = ['grass','grass','grass','grass','water','water','forest','forest','rock','sand','mountain','fertile_soil','grass','grass','grass'];
const mapRng = seededRandom(12345);
for (let y = 0; y < 20; y++) {
  for (let x = 0; x < 20; x++) {
    const type = tileTypes[Math.floor(mapRng() * tileTypes.length)];
    const gen = TILE_GENS[type];
    const tmp = document.createElement('canvas'); tmp.width = 32; tmp.height = 32;
    gen(tmp.getContext('2d'), seededRandom(x * 7919 + y * 6271));
    mctx.drawImage(tmp, x * 32, y * 32);
  }
}
// Draw some characters on the map
for (let i = 0; i < 8; i++) {
  const cx = 3 + Math.floor(mapRng() * 14);
  const cy = 3 + Math.floor(mapRng() * 14);
  const tmp = document.createElement('canvas'); tmp.width = 32; tmp.height = 32;
  const rng2 = seededRandom(i * 777 + Math.floor(mapRng() * 100) + 1000);
  generateCharacter(tmp.getContext('2d'), rng2, Math.floor(mapRng() * 4), Math.floor(mapRng() * 4));
  mctx.drawImage(tmp, cx * 32, cy * 32 - 8);
}
</script>
</body>
</html>
