version: '3.8'
services:
  openworld:
    build: .
    ports:
      - "3001:3001"
    volumes:
      - openworld-data:/data
    environment:
      - PORT=3001
      - WORLD_SIZE=50
      - TICK_INTERVAL=1500
      - DB_PATH=/data/openworld.db
    restart: unless-stopped

volumes:
  openworld-data:
