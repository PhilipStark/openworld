app = 'openworld-restless-feather-3844'
primary_region = 'gru'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '3001'
  WORLD_SIZE = '50'
  TICK_INTERVAL = '1500'
  MAX_AGENTS = '1000'
  DB_PATH = '/data/openworld.db'

[mounts]
  source = 'openworld_data'
  destination = '/data'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
